name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

jobs:
  validate-release:
    name: Validate release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        
    - name: Set up Python
      run: uv python install 3.11
      
    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Check version consistency
      run: |
        TAG_VERSION=${{ steps.get_version.outputs.VERSION }}
        
        # Check pyproject.toml version
        PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
          echo "Version mismatch: tag=$TAG_VERSION, pyproject.toml=$PYPROJECT_VERSION"
          exit 1
        fi
        
        # Check __init__.py version
        INIT_VERSION=$(grep -E '^__version__ = ' vdsxarray/__init__.py | sed 's/__version__ = "\(.*\)"/\1/')
        if [ "$TAG_VERSION" != "$INIT_VERSION" ]; then
          echo "Version mismatch: tag=$TAG_VERSION, __init__.py=$INIT_VERSION"
          exit 1
        fi
        
        echo "✅ All versions match: $TAG_VERSION"
        
    - name: Check CHANGELOG
      run: |
        TAG_VERSION=${{ steps.get_version.outputs.VERSION }}
        if ! grep -q "## \[$TAG_VERSION\]" CHANGELOG.md; then
          echo "❌ CHANGELOG.md does not contain entry for version $TAG_VERSION"
          exit 1
        fi
        echo "✅ CHANGELOG.md contains entry for $TAG_VERSION"

  create-release:
    name: Build and Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-release]
    permissions:
      contents: write  # Required for creating releases
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for proper versioning
      
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        
    - name: Set up Python
      run: uv python install 3.11
      
    - name: Install dependencies
      run: uv sync --group publish
      
    - name: Run tests before release
      run: |
        uv sync --group test
        uv run pytest tests/ -v
      
    - name: Build package
      run: |
        echo "🔨 Building package..."
        uv run python -m build
        echo "📦 Built files:"
        ls -la dist/
        
    - name: Validate package
      run: |
        echo "🔍 Validating package..."
        uv run twine check dist/*
        echo "✅ Package validation passed"
        
    - name: Generate checksums
      run: |
        echo "🔐 Generating checksums..."
        cd dist
        sha256sum * > SHA256SUMS
        echo "📋 Checksums:"
        cat SHA256SUMS
      
    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Extract changelog for this version
      id: changelog
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        echo "📖 Extracting changelog for version $VERSION..."
        
        if [ -f "CHANGELOG.md" ]; then
          # Extract changelog section for this version
          sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' > release_notes.md
          
          # Remove the version header line and clean up
          if [ -s release_notes.md ]; then
            tail -n +2 release_notes.md > release_notes_clean.md
            
            # Check if we have content
            if [ -s release_notes_clean.md ]; then
              echo "CHANGELOG_CONTENT<<EOF" >> $GITHUB_OUTPUT
              cat release_notes_clean.md >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "CHANGELOG_CONTENT=Release $VERSION" >> $GITHUB_OUTPUT
            fi
          else
            echo "CHANGELOG_CONTENT=Release $VERSION" >> $GITHUB_OUTPUT
          fi
        else
          echo "CHANGELOG_CONTENT=Release $VERSION - No changelog available." >> $GITHUB_OUTPUT
        fi
        
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        name: Release v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## 🚀 VDS Xarray Backend v${{ steps.get_version.outputs.VERSION }}
          
          ${{ steps.changelog.outputs.CHANGELOG_CONTENT }}
          
          ### 📦 Installation
          
          ```bash
          pip install vdsxarray==${{ steps.get_version.outputs.VERSION }}
          ```
          
          Or using uv:
          ```bash
          uv add vdsxarray==${{ steps.get_version.outputs.VERSION }}
          ```
          
          ### 📋 Release Assets
          
          This release includes the following files:
          
          - **Source distribution (`.tar.gz`)**: For installation from source
          - **Universal wheel (`.whl`)**: For fast installation with pip
          - **SHA256SUMS**: Checksums for file verification
          
          ### 🔐 Verification
          
          To verify the integrity of downloaded files:
          ```bash
          # Download SHA256SUMS and the files you want to verify
          sha256sum -c SHA256SUMS
          ```
          
          ### 🚀 Quick Start
          
          ```python
          import xarray as xr
          
          # Load VDS file
          ds = xr.open_dataset('your_file.vds', engine='vds')
          
          # Explore your data
          print(ds)
          
          # Visualize a seismic section
          ds.Amplitude.sel(inline=1500).plot(x='crossline', y='sample')
          ```
          
          ### 📚 Documentation
          
          - [📖 User Guide](https://github.com/${{ github.repository }}/blob/main/docs/USER-GUIDE.md) - Complete tutorials and examples
          - [🔧 Technical Overview](https://github.com/${{ github.repository }}/blob/main/docs/TECHNICAL-OVERVIEW.md) - Architecture and implementation
          - [❓ Why Xarray?](https://github.com/${{ github.repository }}/blob/main/docs/WHY-XARRAY.md) - Benefits and motivation
          - [📓 Example Notebook](https://github.com/${{ github.repository }}/blob/main/notebooks/vds-xarray-complete-example.ipynb) - Interactive demo
          
          ### 🐛 Reporting Issues
          
          Found a bug or have a feature request? Please [open an issue](https://github.com/${{ github.repository }}/issues/new/choose).
          
          ### 🤝 Contributing
          
          Contributions are welcome! See our [Contributing Guide](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md).
        files: |
          dist/*
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'rc') }}
        generate_release_notes: false  # We provide our own release notes
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload to PyPI (if stable release)
      if: ${{ !contains(steps.get_version.outputs.VERSION, 'alpha') && !contains(steps.get_version.outputs.VERSION, 'beta') && !contains(steps.get_version.outputs.VERSION, 'rc') }}
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip-existing: true
        
    - name: Create deployment summary
      run: |
        echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** v${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "**Release URL:** ${{ steps.create_release.outputs.url }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Built Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| File | Size | Type |" >> $GITHUB_STEP_SUMMARY
        echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
        cd dist
        for file in *; do
          size=$(ls -lh "$file" | awk '{print $5}')
          if [[ "$file" == *.whl ]]; then
            type="Wheel (Binary)"
          elif [[ "$file" == *.tar.gz ]]; then
            type="Source Distribution"
          elif [[ "$file" == "SHA256SUMS" ]]; then
            type="Checksums"
          else
            type="Other"
          fi
          echo "| $file | $size | $type |" >> $GITHUB_STEP_SUMMARY
        done
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔐 Checksums" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        cat SHA256SUMS >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- [📥 Download Release](${{ steps.create_release.outputs.url }})" >> $GITHUB_STEP_SUMMARY
        echo "- [📦 PyPI Package](https://pypi.org/project/vdsxarray/${{ steps.get_version.outputs.VERSION }}/)" >> $GITHUB_STEP_SUMMARY
        echo "- [📚 Documentation](https://github.com/${{ github.repository }}/blob/main/docs/)" >> $GITHUB_STEP_SUMMARY
        echo "- [🐛 Report Issues](https://github.com/${{ github.repository }}/issues/new/choose)" >> $GITHUB_STEP_SUMMARY
